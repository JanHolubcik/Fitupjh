name: Sync shared files to fitup-native

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "src/lib/queriesOptions/**"
      - "src/lib/validationShemas/**"
      - "src/i18n/locales/**"
      - "src/types/Types.ts"
      - "src/app/[lng]/constants/MacrosHelper.ts"
      - "src/app/[lng]/constants/FunctionsHelper.ts"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Next.js repo (source)
        uses: actions/checkout@v4
        with:
          path: nextjs

      - name: Checkout React Native repo (target)
        uses: actions/checkout@v4
        with:
          repository: JanHolubcik/fitup-native
          token: ${{ secrets.PAT_TOKEN }}
          path: rn

      # ── Locales ───────────────────────────────────────────────────────────────
      - name: Sync locales
        run: |
          rm -rf rn/src/i18n/locales
          cp -r nextjs/src/i18n/locales rn/src/i18n/locales

      # ── Query options ─────────────────────────────────────────────────────────
      - name: Sync queriesOptions
        run: |
          rm -rf rn/src/app/lib/queriesOptions
          mkdir -p rn/src/app/lib/queriesOptions
          cp -r nextjs/src/lib/queriesOptions/. rn/src/app/lib/queriesOptions/

      # ── Validation schemas ───────────────────────────────────────────────────
      - name: Sync validation schemas
        run: |
          rm -rf rn/src/app/lib/validationShemas
          mkdir -p rn/src/app/lib/validationShemas
          cp -r nextjs/src/lib/validationShemas/. rn/src/app/lib/validationShemas/

      # ── Types ─────────────────────────────────────────────────────────────────
      - name: Sync types
        run: |
          rm -f rn/src/types/Types.ts
          mkdir -p rn/src/types
          cp nextjs/src/types/Types.ts rn/src/types/Types.ts

      # ── Helpers ───────────────────────────────────────────────────────────────
      - name: Sync helpers
        run: |
          rm -f rn/src/utils/MacrosHelper.ts rn/src/utils/FunctionsHelper.ts
          mkdir -p rn/src/utils
          cp nextjs/src/app/[lng]/constants/MacrosHelper.ts rn/src/utils/MacrosHelper.ts
          cp nextjs/src/app/[lng]/constants/FunctionsHelper.ts rn/src/utils/FunctionsHelper.ts

      # ── Open a PR in the RN repo ──────────────────────────────────────────────
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          path: rn
          commit-message: "chore: Sync shared files from Fitupjh"
          branch: "sync/shared-from-nextjs"
          delete-branch: true
          title: "chore: Sync shared files from Next.js"
          body: |
            Automated sync triggered by a push to `master` in [Fitupjh](https://github.com/JanHolubcik/Fitupjh).

            **Changed directories:**
            - `src/i18n/locales` → `src/i18n/locales`
            - `src/lib/queriesOptions` → `src/app/lib/queriesOptions`
            - `src/lib/validationShemas` → `src/app/lib/validationShemas`
            - `src/types/Types.ts` → `src/types/Types.ts`
            - `src/app/[lng]/constants/*Helper.ts` → `src/utils/*Helper.ts`

            Review the diff and merge when ready.
          labels: "sync,automated"

