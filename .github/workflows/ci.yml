name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      # Next.js and library initializations require these dummy environment variables during the build phase
      MONGODB_URI: mongodb://127.0.0.1:27017/fitup
      BETTER_AUTH_SECRET: dummy_secret_for_ci_build_verification_purposes_only
      BETTER_AUTH_URL: http://localhost:3000
      GEMINI_API_KEY: dummy_gemini_api_key
      UPSTASH_REDIS_REST_URL: https://dummy-redis.upstash.io
      UPSTASH_REDIS_REST_TOKEN: dummy_token

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run TypeScript Compile Check
        run: npm run typecheck

      - name: Run Tests
        run: npm run test

      - name: Build project
        run: npm run build
